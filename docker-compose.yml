services:
  db:
    image: postgres:15
    container_name: postgres_orders
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders_db
    ports:
      - "5432:5432"

  orders_api:
    build: .
    container_name: orders_api
    depends_on:
      - db
    ports:
      - "3000:3000"
    env_file:
      - .env